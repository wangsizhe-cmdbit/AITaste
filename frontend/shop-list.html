<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>AI食光</title>
  <!-- 引入样式 -->
  <link rel="stylesheet" href="./css/element.css">

  <link href="./css/shop-list.css" rel="stylesheet">
  <link href="./css/main.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs2@0.0.2/qrcode.min.js"></script>

  <style type="text/css">

  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
    <div class="header-title">美食</div>
    <div class="header-search">
      <i class="el-icon-search"></i>
    </div>
  </div>
  <div class="sort-bar">
    <div class="sort-item" @click="sortAndQuery('')">
      默认 <i class="el-icon-arrow-down el-icon--right"></i>
    </div>
    <div class="sort-item" @click="sortAndQuery('distance')">
      距离 <i class="el-icon-arrow-down el-icon--right"></i>
    </div>
    <div class="sort-item" @click="sortAndQuery('comments')">
      人气 <i class="el-icon-arrow-down el-icon--right"></i>
    </div>
    <div class="sort-item" @click="sortAndQuery('score')">
      评分 <i class="el-icon-arrow-down el-icon--right"></i>
    </div>
  </div>
  <div class="shop-list" @scroll="onScroll">
    <div class="shop-box" v-for="s in shops" :key="s.id" @click="toDetail(s.id)">
      <div class="shop-img"><img :src="s.images" alt=""></div>
      <div class="shop-info">
        <div class="shop-title shop-item">{{s.name}}</div>
        <div class="shop-rate shop-item" >
          <el-rate
              disabled v-model="s.score/10"
              text-color="#F63"
              show-score
          ></el-rate>
          <span>{{s.comments}}条</span>
        </div>
        <div class="shop-area shop-item">
          <span>{{s.area}}</span>
          <span v-if="s.distance">{{s.distance < 1000 ? s.distance.toFixed(1) + 'm' : (s.distance/1000).toFixed(1) + 'km'}}</span>
        </div>
        <div class="shop-avg shop-item">￥{{s.avgPrice}}/人</div>
        <div class="shop-address shop-item">
          <i class="el-icon-map-location"></i>
          <span>{{s.address}}</span>
        </div>
      </div>
    </div>
  </div>
  <!-- 聊天窗口 -->
  <div class="chat-widget" v-show="showChat" @click.stop>
    <div class="chat-header">
      <span>智能助手</span>
      <i class="el-icon-close" @click="showChat = false"></i>
    </div>
    <div class="chat-messages" ref="chatMessages">
      <div v-for="msg in messages" :key="msg.id" class="message" :class="msg.role">
        <div v-if="msg.role === 'user'" class="user-message">{{ msg.content }}</div>
        <div v-else-if="msg.role === 'bot'" class="bot-message">
          <!-- 显示文本内容（支持换行） -->
          <div style="white-space: pre-wrap;">{{ msg.content }}</div>
          <!-- 新增：如果有二维码内容，则渲染二维码图片 -->
          <div v-if="msg.qrCode" :id="'qr-' + msg.id" class="qr-in-chat"></div>
        </div>
      </div>
    </div>
    <div class="chat-input">
      <button class="voice-btn" @click="startVoiceInput" :disabled="isRecording">
        <i class="el-icon-microphone"></i>
      </button>
      <input type="text" v-model="inputText" @keyup.enter="sendMessage" placeholder="说句话或打字..." />
      <button @click="sendMessage">发送</button>
    </div>
  </div>
  <div class="guide-bubble" v-show="showGuideBubble" @click="openChatAndGuide">
    <span>{{ guideText }}</span>
  </div>
  <button class="open-chat-btn" @click="showChat = true">🤖</button>
</div>
<script src="./js/vue.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/common.js"></script>
<script>
  Vue.use(ELEMENT);

  const app = new Vue({
    el: "#app",
    data: {
      util,
      shops: [], // 商店列表
      showChat: false,        // 是否显示聊天窗口
      messages: [],           // 聊天记录
      inputText: '',          // 输入框内容
      isRecording: false,     // 是否正在录音
      recognition: null,      // 语音识别对象
      sessionId: Date.now().toString(),  // 会话ID（用于后端记忆）
      userId: null,
      showGuideBubble: false,    // 控制气泡显示
      idleTimer: null,           // 计时器ID
      guideText: '需要帮忙找餐厅吗？',
      guideAutoQuery: '帮我推荐餐厅',
      guideReady: false,
      params:{
        current: 1,
        sortBy: "",
        x: null,
        y: null
      },
      isReachBottom: false,
    },
    created() {
     this.userId = this.getUserId();
     // 先获取定位，再查询店铺
    this.getCurrentLocation()
    .then(location => {
      this.params.x = location.x;
      this.params.y = location.y;
      this.queryShops();
    })
    .catch(err => {
      console.warn('定位失败，使用默认坐标或提示用户', err);
      // 可选：降级使用默认坐标（例如西安钟楼）
      this.params.x = 108.982164;
      this.params.y = 34.380615;
      this.queryShops();
    });
    },
    mounted() {
      // 先获取引导语，成功后再启动空闲计时器
      this.fetchGuideText().then(() => {
        this.startIdleTimer();
      }).catch(() => {
      // 即使失败也启动计时器（使用默认文字）
      this.startIdleTimer();
      });
      // 监听用户活动事件
      window.addEventListener('touchstart', this.resetIdleTimer);
      window.addEventListener('scroll', this.resetIdleTimer);
      // 初始化语音识别
      if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        this.recognition = new SpeechRecognition();
        this.recognition.lang = 'zh-CN';          // 中文
        this.recognition.interimResults = false;   // 只返回最终结果
        this.recognition.maxAlternatives = 1;

        this.recognition.onstart = () => {
          console.log('语音识别开始');
        };

        this.recognition.onresult = (event) => {
          const text = event.results[0][0].transcript;
          console.log('识别结果：', text);
          this.inputText = text;        // 将识别结果填入输入框
          this.sendMessage();           // 自动发送
          this.isRecording = false;
        };

        this.recognition.onerror = (event) => {
          console.error('语音识别错误', event.error);
          this.$message.error('语音识别失败，请重试');
          this.isRecording = false;
        };

        this.recognition.onend = () => {
        this.isRecording = false;
        };
      } else {
        console.warn('当前浏览器不支持语音识别');
        this.$message.warning('您的浏览器不支持语音输入');
      }
    },
    beforeDestroy() {
    if (this.idleTimer) clearTimeout(this.idleTimer);
    window.removeEventListener('touchstart', this.resetIdleTimer);
    window.removeEventListener('scroll', this.resetIdleTimer);
    },
    methods: {
    // 获取当前地理位置
    getCurrentLocation() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error('浏览器不支持定位'));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const { latitude, longitude } = position.coords;
          resolve({ x: longitude, y: latitude });
        },
        (error) => {
          console.error('定位失败', error);
          reject(error);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
          );
        });
      },
      // 启动空闲计时器
      startIdleTimer() {
        if (this.idleTimer) clearTimeout(this.idleTimer);
          this.idleTimer = setTimeout(() => {
            // 只有在聊天窗口关闭且气泡未显示时，才显示气泡
            if (!this.showChat && !this.showGuideBubble) {
              this.showGuideBubble = true;
            }
          }, 5000);
      },
      resetIdleTimer() {
        // 聊天窗口打开时，不重置计时器（避免到期后误判）
        if (this.showChat) return;
        if (this.showGuideBubble) return;
        if (this.idleTimer) {
          clearTimeout(this.idleTimer);
          this.idleTimer = null;
        }
        this.startIdleTimer();
      },
      getUserId() {
        let userId = localStorage.getItem('userId');
        // 如果不存在，或者包含小数点（旧格式），则重新生成
        if (!userId || userId.includes('.')) {
          userId = Date.now() + '' + Math.floor(Math.random() * 10000);
          localStorage.setItem('userId', userId);
        }  
        return userId;
      },
      fetchGuideText() {
        const token = sessionStorage.getItem('token');
        const url = `/api/ai/guide/home?userId=${this.userId}`;
        console.log('请求URL:', url);
        // 必须 return fetch 返回的 Promise
        return fetch(url, { 
          method: 'GET',
          headers: { 'Content-Type': 'application/json' ,
                    'authorization': token   
                   }
        })
        .then(response => {
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return response.json();
        })
        .then(data => {
          console.log('引导语响应数据:', data);
          if (data && data.guideText) {
            this.guideText = data.guideText;
            this.guideAutoQuery = data.autoQuery || '帮我推荐餐厅';
          }
        })
        .catch(err => {
          console.error('获取引导语失败:', err);
        });
      },
      openChatAndGuide() {
        this.showChat = true;
        this.showGuideBubble = false;
        if (this.idleTimer) {
          clearTimeout(this.idleTimer);
          this.idleTimer = null;
        }
        if (this.messages.length === 0) {
          this.inputText = this.guideAutoQuery;
          this.sendMessage();
        }
      },
      closeChat() {
        this.showChat = false;
        // 关闭聊天窗口后，重新启动空闲计时器（让气泡可以再次出现）
        if (!this.showGuideBubble && !this.idleTimer) {
          this.startIdleTimer();
        }
      },
      startVoiceInput() {
        if (!this.recognition) {
           this.$message.error('浏览器不支持语音输入');
           return;
         }
        if (this.isRecording) return;
           this.isRecording = true;
           this.recognition.start();
      },
      sendMessage() {
        const token = sessionStorage.getItem('token');
        const userMsg= this.inputText.trim();
        if (!userMsg) return;
        // 添加用户消息到聊天记录
        this.messages.push({
          id: Date.now(),
          role: 'user',
          content: userMsg
        });
        this.inputText = '';

        const botMsgId = Date.now() + 1;
        this.messages.push({
           id: botMsgId,
           role: 'bot',
           content: ''
        });

        const botMsg = this.messages[this.messages.length - 1];

        // 构建请求体，符合后端 ChatRequest
        const requestBody = {
          query: userMsg,
          sessionId: this.sessionId,
          userId: parseInt(this.userId),
          context: { source: 'guide_bubble' }  // 可根据需要修改 source
        };
        // 调用后端 AI 接口（假设已有 /ai/chat）
        fetch('/api/ai/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' ,
                     'authorization': token   
                   },
          body: JSON.stringify(requestBody)
        })
        .then(async (response) => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder('utf-8');
          let buffer = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
  
            // 按行分割
            const lines = buffer.split('\n');
            buffer = lines.pop(); // 保留最后一行可能不完整
  
            for (const line of lines) {
              if (line.startsWith('data:')) {
                const content = line.slice(5).trim(); // 去掉 "data:" 前缀并 trim
                if (content) {
                  botMsg.content += content;
                  this.$forceUpdate();
                  // 滚动到底部
                  this.$nextTick(() => {
                    const container = this.$refs.chatMessages;
                    if (container) container.scrollTop = container.scrollHeight;
                  });
                }
              }
            }
          }
          // 所有数据接收完毕，统一格式化（只执行一次）
        // 所有数据接收完毕
        botMsg.content = botMsg.content
        .replace(/(\d+\.)/g, '\n$1')        // 数字编号前加换行
        .replace(/\*\*/g, '')
        .replace(/###+/g, '\n\n')
        .replace(/##+/g, '\n\n')
        .replace(/\s*-\s*/g, '\n')
        .replace(/\n{3,}/g, '\n\n');

        // ========== 新增：检测并提取二维码内容 ==========
        // 匹配类似 "VOUCHER_123456789" 的字符串（可根据你的实际格式调整）
        const qrMatch = botMsg.content.match(/VOUCHER_\d+/);
        if (qrMatch) {
          botMsg.qrCode = qrMatch[0];
          // 可选：从消息内容中移除二维码字符串，避免重复显示
          botMsg.content = botMsg.content.replace(qrMatch[0], '').replace(/：$/, '').trim();
          if (botMsg.content === '') {
            botMsg.content = '请出示以下二维码给店员扫码核销：';
          }
        }
        // ===============================================
        this.$forceUpdate();
         // 新增：如果有二维码，在DOM渲染后生成二维码图片
        if (botMsg.qrCode) {
          this.$nextTick(() => {
            const container = document.getElementById('qr-' + botMsg.id);
            if (container) {
              // 清空可能残留的内容
              container.innerHTML = '';
              new QRCode(container, {
                text: botMsg.qrCode,
                width: 150,
                height: 150,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.L
              });
            }
          });
        }
        })
        .catch(err => {
          console.error('流式请求失败:', err);
          // 如果出错且 bot 消息内容仍为空，显示错误提示
          if (botMsg.content === '') {
            botMsg.content = '抱歉，服务暂时不可用，请稍后重试。';
            this.$forceUpdate();
          } else {
            this.$message.error('网络错误');
          }
        })
      },
       queryShops() {
        axios.get("/shop/all", {
            params: this.params
          })
          .then(({data}) => {
            if (!data) {
              return
            }
            data.forEach(s => s.images = s.images.split(',')[0]);
            this.shops = this.shops.concat(data);
          })
          .catch(err => {
            console.log(err);
            this.$message.error(err)
          })
      },
      sortAndQuery(sortBy) {
        this.params.sortBy = sortBy;
        this.queryShops();
      },
      goBack() {
        history.back();
      },
      toDetail(id) {
        location.href = "/shop-detail.html?id="+id
      },
      onScroll(e) {
        let scrollTop = e.target.scrollTop;
        let offsetHeight = e.target.offsetHeight;
        let scrollHeight = e.target.scrollHeight;
        if(scrollTop + offsetHeight + 1 > scrollHeight && !this.isReachBottom){
          this.isReachBottom = true
          console.log("触底")
          this.params.current++
          this.queryShops(this.params.current, 5);
        }else{
          this.isReachBottom = false
        }
      },
    }
  })
</script>
</body>
</html>
