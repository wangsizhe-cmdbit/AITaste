<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>AI食光</title>
  <link href="./css/login.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/element.css">

  <style type="text/css">
      /* 现代系统字体 */
      body, .login-container, .el-input, .el-button {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      }
      .el-radio__input.is-checked .el-radio__inner {
          border-color: #007bff;
          background: #007bff;
      }
      .el-input__inner:focus {
          border: 1px solid #007bff;
      }
      .el-button.is-loading {
          pointer-events: none;
      }
      .forget-link, .code-link {
          text-decoration: none;
          color: #007bff;
      }
      .forget-link:hover, .code-link:hover {
          text-decoration: underline;
      }
  </style>
</head>
<body>
<div id="app">
  <div class="login-container">
    <div class="header">
      <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
      <div class="header-title">密码登录&nbsp;&nbsp;&nbsp;</div>
    </div>
    <div class="content">
      <div class="login-form">
        <el-input placeholder="请输入手机号" v-model="form.phone" clearable></el-input>
        <div style="height: 5px"></div>
        <el-input placeholder="请输入密码" v-model="form.password" type="password" show-password clearable></el-input>
        <el-button @click="login" :loading="loginLoading" style="width: 100%; background-color:#007bff; color: #fff;">登录</el-button>
        <div style="text-align: right; color:#333333; margin: 5px 0">
          <a href="/login.html" class="code-link">验证码登录</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script>
  const app = new Vue({
    el: "#app",
    data: {
      loginLoading: false,
      form: {
        phone: '',
        password: ''
      }
    },
    methods: {
      login() {
  if (!this.form.phone || !this.form.phone.trim()) {
    this.$message.error("请输入手机号");
    return;
  }
  if (!this.form.password || !this.form.password.trim()) {
    this.$message.error("请输入密码");
    return;
  }
  const phoneReg = /^1[3-9]\d{9}$/;
  if (!phoneReg.test(this.form.phone.trim())) {
    this.$message.error("请输入正确的11位手机号码");
    return;
  }

  this.loginLoading = true;
  axios.post("/user/passwordLogin", {
    phone: this.form.phone.trim(),
    password: this.form.password.trim()
  })
  .then((data) => {
    const res = data;
    if (res.success === true) {
      const data = res.data;
      if (data && data.userId && data.token) {
        localStorage.setItem("userId", data.userId);
        sessionStorage.setItem("token", data.token);
        this.$message.success("登录成功");
        setTimeout(() => {
          location.href = "/index.html";
        }, 500);
      } else {
        this.$message.error("登录失败：响应数据异常");
      }
    } else {
      const errMsg = res.errorMsg || "登录失败";
      if (errMsg.includes("未设置密码") || errMsg.includes("请使用验证码登录")) {
        this.$alert('您尚未设置密码，请使用验证码登录', '提示', {
          confirmButtonText: '去验证码登录',
          callback: () => location.href = "/login.html"
        });
      } else {
        this.$message.error(errMsg);
      }
    }
  })
  .catch(error => {
    this.$message.error(error.response?.data?.errorMsg || "登录失败");
  })
  .finally(() => {
    this.loginLoading = false;
  });
},
      goBack() {
        history.back();
      }
    }
  })
</script>
</body>
</html>
