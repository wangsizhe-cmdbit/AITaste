server:
  port: 8082
spring:
  application:
    name: AITaste
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/aitaste?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: 192.168.114.128
      port: 6379
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
    serialization:
      indent-output: true
  ai:
    zhipuai:
      api-key: ${ZHIPU_API_KEY:}
      chat:
        options:
          model: glm-4.5-air       # 使用的模型
  servlet:
      multipart:
        max-file-size: 20MB      # 单个文件最大大小
        max-request-size: 20MB   # 整个请求最大大小
mybatis-plus:
  type-aliases-package: com.AITaste.entity # 别名扫描包
  configuration:
    map-underscore-to-camel-case: true
logging:
  level:
    com.hmdp: debug
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    custom-domain: https://dianpingpicture.oss-cn-beijing.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: dianpingpicture